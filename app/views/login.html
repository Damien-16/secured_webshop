<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
<form id="loginForm">
    <h1>Connexion</h1>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
    </div>
    <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required>
    </div>
    <button type="submit">Se connecter</button>
    <p id="message" class="message" style="color: red;"></p>
    <div style="margin-top: 15px; text-align: center; font-size: 0.9rem; color: var(--muted);">
        Pas encore de compte ? <a href="/register" style="color: var(--primary); font-weight: 600;">S'inscrire ici</a>
    </div>
</form>

            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
</body>
</html>
